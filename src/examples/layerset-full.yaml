#
# Full layerset KaptainPM.yaml example with all allowed fields populated.
# Validates against spec-kaptainpm-schema-layerset.yaml (layerset variant).
# Layersets are pure composition units - they only contain spec.layers.

apiVersion: kaptain.org/1.2
kind: kubernetes-app-docker-dockerfile
metadata:
  description: "example layerset composing a complete build type"

spec:
  layers:
    - layer-quality-defaults:1.0
    - layer-docker-config:2.1
    - layer-k8s-generators:1.5
    - layer-monitoring:1.2
